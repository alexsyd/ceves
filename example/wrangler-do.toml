# Wrangler configuration for Durable Objects mode
name = "ceves-example-do"
main = "src/index-do.ts"
compatibility_date = "2025-01-01"

# R2 bucket for event storage
[[r2_buckets]]
binding = "EVENTS_BUCKET"
bucket_name = "ceves-events-do"
preview_bucket_name = "ceves-events-do-preview"

# R2 bucket for snapshot storage (optional, can use same bucket)
[[r2_buckets]]
binding = "SNAPSHOTS_BUCKET"
bucket_name = "ceves-snapshots-do"
preview_bucket_name = "ceves-snapshots-do-preview"

# Durable Object binding for bank accounts
[[durable_objects.bindings]]
name = "BANK_ACCOUNT"
class_name = "BankAccountAggregate"
script_name = "ceves-example-do"

# Durable Object migrations (using new_sqlite_classes for free plan)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["BankAccountAggregate"]
